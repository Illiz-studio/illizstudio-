<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illiz Studio | الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* الحركات الجمالية */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            max-width: 400px;
            width: 90%;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1565c0, #00d2ff);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 20px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
        }

        h1 { color: #1565c0; margin: 10px 0; }
        .social-links { margin: 20px 0; }
        .social-links a {
            color: #1565c0;
            font-size: 24px;
            margin: 0 10px;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-links a:hover { color: #00d2ff; transform: translateY(-3px); display: inline-block; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        .btn-send {
            background: #1565c0;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">IS</div>
    <h1>Illiz Studio</h1>
    <p>مرحباً بك في مشروعي الأول المطور!</p>

    <div class="social-links">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
    </div>

    <hr style="opacity: 0.2;">

    <h3>تواصل معي مباشرة ✉️</h3>
    <form action="https://formspree.io/f/your-id" method="POST">
        <input type="text" name="name" placeholder="الاسم" required>
        <input type="email" name="email" placeholder="بريدك الإلكتروني" required>
        <textarea name="message" rows="3" placeholder="اكتب رسالتك..." required></textarea>
        <button type="submit" class="btn-send">إرسال الرسالة</button>
    </form>
    
    <p style="font-size: 12px; color: #999; margin-top: 20px;">© 2026 جميع الحقوق محفوظة لـ Illiz Studio</p>
</div>

</body>
</html>
